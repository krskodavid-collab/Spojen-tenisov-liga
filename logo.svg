<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140">
  <defs>
    <radialGradient id="ringGrad" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="60%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="stlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8e10c"/>
    </linearGradient>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>

  <!-- Monogram circle -->
  <g transform="translate(70, 70)">
    <circle r="58" fill="url(#ringGrad)" stroke="#a8e10c" stroke-width="2.5"/>
    <circle r="52" fill="none" stroke="#1a1a1a" stroke-width="1"/>

    <!-- STL monogram -->
    <text x="0" y="14" font-family="'Helvetica Neue', Arial Black, sans-serif" font-weight="900"
          font-size="46" fill="url(#stlGrad)" text-anchor="middle" letter-spacing="-2">STL</text>

    <!-- tiny tennis ball as accent -->
    <g transform="translate(28, -26)">
      <circle r="6" fill="#d9ff3d"/>
      <path d="M -5,-2 Q 0,-5 5,-2" stroke="#fff" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M -5,2 Q 0,5 5,2" stroke="#fff" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="'Helvetica Neue', Arial, sans-serif">
    <text x="150" y="62" font-size="28" font-weight="900" fill="url(#textGrad2)" letter-spacing="2">SPOJENÁ</text>
    <text x="150" y="92" font-size="20" font-weight="800" fill="#a8e10c" letter-spacing="3.5">TENISOVÁ LIGA</text>
    <line x1="150" y1="72" x2="450" y2="72" stroke="#1f2937" stroke-width="1"/>
  </g>
</svg>
